<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080808" />
    <meta
      name="description"
      content="A collection of eight interactive generative brand tools."
    />
    <meta property="og:title" content="Generative Tools" />
    <meta
      property="og:description"
      content="A collection of eight interactive generative brand tools."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23080808'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%2370b0fa'/%3E%3C/svg%3E"
    />
    <title>Generative Tools</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="tool-stage" aria-label="Generative tool workspace">
      <iframe
        id="tool-frame-a"
        class="tool-frame is-buffer"
        title="Chainguard block"
        loading="eager"
        allow="clipboard-write; fullscreen"
        inert
      ></iframe>
      <iframe
        id="tool-frame-b"
        class="tool-frame is-buffer"
        title=""
        loading="eager"
        allow="clipboard-write; fullscreen"
        inert
      ></iframe>
    </main>

    <!--
      Transparent click-catcher over the stage, present only while the menu
      is open (see main.js's setMenuOpen and styles.css's .stage-scrim for
      why: the tool iframes are a separate browsing context, so a click on
      the canvas never reaches this document's click-outside listeners
      without something non-iframe sitting in front of it to catch it).
      `hidden` by default so it never intercepts normal tool interaction.
    -->
    <div class="stage-scrim" id="stage-scrim" aria-hidden="true" hidden></div>

    <div class="dock" data-open="false" data-instant="false">
      <div
        class="dock-menu"
        id="tool-menu"
        role="menu"
        aria-label="Choose a generative tool"
        aria-hidden="true"
      ></div>

      <button
        class="dock-trigger"
        id="dock-trigger"
        type="button"
        aria-haspopup="menu"
        aria-controls="tool-menu"
        aria-expanded="false"
      >
        <span class="dock-status" aria-hidden="true"></span>
        <span class="dock-current" id="dock-current">Chainguard block</span>
        <span class="dock-divider" aria-hidden="true"></span>
        <span class="dock-chevron" aria-hidden="true">
          <svg viewBox="0 0 12 12" focusable="false">
            <path d="m3 7.25 3-3 3 3" />
          </svg>
        </span>
      </button>
    </div>

    <div class="sr-only" id="tool-announcement" aria-live="polite"></div>
  </body>
</html>
